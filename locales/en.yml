en:
  theme_metadata:
    description: "Transforms your sidebar into an LMS-style progress tracker with completion badges and checkmarks. ⚠️ Requires the backend plugin: https://github.com/zsviczian/discourse-course-progress and the Discourse Doc Categories plugin."
